<div class="login-wrapper">
  <div class="login-container">
    <!-- Login Form Card -->
    <main class="login-card">
      <!-- Brand Title Header -->
      <h1 class="brand-title">
        <span class="brand-logo">🥗</span>
        <span class="title-text">MealPlan</span>
      </h1>
      <form (ngSubmit)="onLoginSubmit()" #loginForm="ngForm" novalidate class="auth-form">
        <div class="form-group">
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="credentials.username"
            required
            placeholder="Enter your username"
            class="form-control"
            aria-label="Username"
          />
        </div>

        <div class="form-group">
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="credentials.password"
            required
            placeholder="Enter your password"
            class="form-control"
            aria-label="Password"
          />
        </div>

        <button type="submit" class="login-submit-btn">Log In</button>
      </form>
    </main>
    <footer class="login-footer-links">
      <button class="utility-link" type="button">Create Account</button>
      <span class="link-divider">|</span>
      <button class="utility-link" type="button">Forgot Username/Password</button>
    </footer>
  </div>
</div>
