<div
  style="
    padding: 20px;
    border: 2px dashed #ef4444;
    border-radius: 8px;
    margin-bottom: 20px;
    background-color: rgba(239, 68, 68, 0.05);
  "
>
  <h3 style="margin-top: 0; color: #ef4444">Dev Test Area</h3>
  <button type="button" class="btn-primary" (click)="showIngredientSearch = true">
    Open Ingredient Database
  </button>
</div>

@if (showIngredientSearch) {
  <app-ingredient-search
    (closeForm)="showIngredientSearch = false"
    (ingredientSelected)="onIngredientSelected($event)"
  >
  </app-ingredient-search>
}
